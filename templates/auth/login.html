{% extends 'base.html' %}
{% block title %}Autentificare — Auto Service{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4 col-sm-8">
    <div class="card shadow mt-5">
      <div class="card-body p-4">
        <h4 class="card-title text-center mb-4">🔧 Auto Service</h4>
        <h6 class="text-center text-muted mb-4">Autentificare</h6>
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label for="username" class="form-label">Utilizator</label>
            <input type="text" class="form-control" id="username" name="username"
                   autofocus required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Parolă</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">Autentifică-te</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
